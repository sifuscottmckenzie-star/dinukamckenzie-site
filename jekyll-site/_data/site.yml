# ── ABOUT ──
about_photo: "images/2021-04-01_DM_Low-Res_copyright_Emma-Stergio-683x1024.jpg"
about_pronunciation: "Dinuka is pronounced Dee-noo-kah — the emphasis is on the second syllable."
about_bio_para1: "Dinuka McKenzie is an award-winning Australian crime fiction author and the winner of the 2020 HarperCollins Australia Banjo Prize for unpublished fiction."
about_bio_para2: "Her debut novel The Torrent introduced Detective Sergeant Kate Miles — a pregnant detective navigating a deadly flood investigation — and was shortlisted for the 2023 Davitt Awards and the 2023 Danger Awards."
about_bio_para3: "The Detective Kate Miles series — The Torrent, Taken, and Tipping Point — is published in Australia by HarperCollins and in the UK by Canelo Crime. Her fourth novel, She Lied First, a standalone psychological suspense, will be published by HarperCollins Australia in July 2026."
about_bio_para4: "Dinuka is represented by Alex Adsett Literary."
about_events_text: "Dinuka is available for author talks, panels, workshops, and manuscript mentorship sessions. She regularly appears at writers festivals and library events across Australia."
about_workshops_text: "Dinuka runs crime fiction writing workshops and manuscript assessment sessions through the South Coast Writers Centre and Writing NSW."

