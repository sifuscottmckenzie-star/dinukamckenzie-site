year: "2022 · HarperCollins Australia · Canelo Crime UK"
desc: "A pregnant detective. A deadly flood. A case that comes back to haunt her."
synopsis: "In Northern New South Wales, heavily pregnant and a week away from maternity leave, Detective Sergeant Kate Miles is exhausted. When a violent hold-up at a local restaurant with unsettling connections to her past means her final days will be anything but quiet, and a closed case — a man drowned in recent summer floods — lands on her desk, what begins as an informal review grows into something far more dangerous."
