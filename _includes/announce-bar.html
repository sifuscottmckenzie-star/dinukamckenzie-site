{% assign s = site.data.site %}
<div class="announce-bar" id="announce-bar">
  <div class="announce-pulse"></div>
  <p class="announce-text"><strong>{{ s.announce_text }}</strong> <em>{{ s.announce_book }}</em> — {{ s.announce_sub }}</p>
  <a class="announce-cta" data-page="books">See the Book</a>
  <button class="announce-close" id="announce-close-btn">&#215;</button>
</div>
