<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dinuka McKenzie — Crime Fiction Author</title>
  <meta name="description" content="Award-winning Australian crime fiction author. Creator of the Detective Kate Miles series.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute;overflow:hidden;">
  <defs>
    <radialGradient id="ig-grad" cx="30%" cy="107%" r="120%">
      <stop offset="0%"  stop-color="#fdf497"/>
      <stop offset="5%"  stop-color="#fdf497"/>
      <stop offset="45%" stop-color="#fd5949"/>
      <stop offset="60%" stop-color="#d6249f"/>
      <stop offset="90%" stop-color="#285AEB"/>
    </radialGradient>
  </defs>
</svg>

<div class="announce-bar" id="announce-bar">
  <div class="announce-pulse"></div>
  <p class="announce-text"><strong>New Book Out Now:</strong> <em>She Lied First</em> &#8212; Two sisters. The dream apartment. Two lives about to unravel.</p>
  <a class="announce-cta" data-page="books" style="cursor:pointer;">See the Book</a>
  <button class="announce-close" id="announce-close-btn">&#215;</button>
</div>

<nav id="main-nav">
  <a class="nav-logo" data-page="home">Dinuka <span>McKenzie</span></a>
  <ul class="nav-tabs">
    <li><a data-page="home" id="tab-home" class="active">Home</a></li>
    <li><a data-page="books" id="tab-books">Books</a></li>
    <li><a data-page="about" id="tab-about">About</a></li>
    <li><a data-page="news" id="tab-news">News &amp; Events</a></li>
    <li><a data-page="contact" id="tab-contact">Contact</a></li>
  </ul>
</nav>

{{ content }}

<script src="/assets/js/main.js"></script>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
</body>
</html>
