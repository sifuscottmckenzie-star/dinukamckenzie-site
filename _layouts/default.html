<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title | default: "Dinuka McKenzie — Crime Fiction Author" }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
<style>
:root{--sand:#f5f0e8;--cream:#faf7f2;--warm:#ede6d8;--rust:#9e3d22;--brown:#3d2b1f;--mid:#6b5444;--fog:#9c8c7c;--ink:#1e160e;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--cream);color:var(--ink);font-family:"DM Sans",sans-serif;font-size:16px;line-height:1.7;overflow-x:hidden;}
img{display:block;max-width:100%;}
/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:1rem 3.5rem;background:rgba(250,247,242,.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(61,43,31,.08);transition:box-shadow .3s;}

nav.scrolled{box-shadow:0 2px 20px rgba(61,43,31,.08);}
.nav-logo{font-family:"Playfair Display",serif;font-size:1.1rem;color:var(--brown);text-decoration:none;cursor:pointer;}
.nav-logo span{color:var(--rust);}
.nav-tabs{display:flex;list-style:none;background:rgba(61,43,31,.06);border-radius:4px;padding:3px;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.nav-tabs li a{display:block;font-size:.78rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--mid);text-decoration:none;padding:.45rem 1.1rem;border-radius:3px;transition:all .2s;white-space:nowrap;cursor:pointer;}
.nav-tabs li a:hover{color:var(--rust);}
.nav-tabs li a.active{background:#fff;color:var(--rust);box-shadow:0 1px 4px rgba(61,43,31,.12);}
.nav-right{display:flex;align-items:center;gap:1rem;}
.nav-cta{font-size:.75rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#fff;background:var(--rust);padding:.55rem 1.3rem;border-radius:2px;text-decoration:none;}
/* PAGES */
.page{display:block;min-height:100vh;}
/* HERO */
.hero{min-height:100vh;padding-top:80px;display:grid;grid-template-columns:1fr 1fr;background:var(--sand);overflow:hidden;position:relative;}
.hero-left{display:flex;flex-direction:column;justify-content:center;padding:5rem 4rem 5rem 4.5rem;position:relative;z-index:2;}
.hero-eyebrow{font-size:.72rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--rust);margin-bottom:1.4rem;opacity:0;animation:fadeUp .7s ease .15s forwards;}
.hero-name{font-family:"Playfair Display",serif;font-size:clamp(3.5rem,6vw,6rem);font-weight:900;line-height:1;color:var(--brown);margin-bottom:1.5rem;opacity:0;animation:fadeUp .7s ease .3s forwards;}
.hero-badge{display:inline-flex;align-items:center;gap:.6rem;background:rgba(158,61,34,.1);border:1px solid rgba(158,61,34,.2);border-radius:100px;padding:.45rem 1rem;font-size:.75rem;font-weight:500;color:var(--rust);margin-bottom:1.5rem;width:fit-content;opacity:0;animation:fadeUp .7s ease .42s forwards;}
.hero-badge::before{content:"★";font-size:.7rem;}
.hero-tagline{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:1.3rem;color:var(--mid);max-width:400px;line-height:1.55;margin-bottom:2.5rem;opacity:0;animation:fadeUp .7s ease .55s forwards;}
.hero-cta{display:flex;gap:1rem;align-items:center;opacity:0;animation:fadeUp .7s ease .68s forwards;}
.btn-primary{font-size:.8rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--rust);padding:.85rem 2rem;border-radius:2px;text-decoration:none;transition:background .25s;}
.btn-primary:hover{background:var(--brown);}
.btn-outline{font-size:.8rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--brown);border:1.5px solid rgba(61,43,31,.3);padding:.85rem 2rem;border-radius:2px;text-decoration:none;cursor:pointer;transition:border-color .25s,color .25s;}
.btn-outline:hover{border-color:var(--rust);color:var(--rust);}
.hero-right{position:relative;overflow:hidden;}
.hero-photo{position:absolute;inset:0;background:var(--warm);}
.hero-photo img{width:100%;height:100%;object-fit:cover;object-position:top center;opacity:0;animation:fadeIn 1s ease .6s forwards;}
.hero-photo::after{content:"";position:absolute;inset:0;background:linear-gradient(to right,var(--sand) 0%,transparent 22%);pointer-events:none;}
/* MARQUEE */
.marquee-strip{background:var(--brown);padding:.75rem 0;overflow:hidden;white-space:nowrap;}
.marquee-inner{display:inline-flex;animation:marquee 28s linear infinite;}
.marquee-item{font-size:.7rem;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:rgba(245,240,232,.65);padding:0 3rem;}
.marquee-sep{color:var(--rust);}
@keyframes marquee{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
/* SLF PROMO */
.slf-promo{background:#0d1a3a;display:grid;grid-template-columns:1fr 1fr;min-height:580px;overflow:hidden;}
.slf-promo-visual{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#0a1228;padding:4rem 3rem;}
.slf-promo-visual::before{content:"";position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,180,220,.18) 0%,transparent 70%);top:-10%;left:-15%;pointer-events:none;}
.slf-cover-large{width:72%;max-width:320px;border-radius:4px;box-shadow:0 30px 80px rgba(0,0,0,.65);position:relative;z-index:2;transform:perspective(900px) rotateY(-8deg);transition:transform .5s;}
.slf-cover-large:hover{transform:perspective(900px) rotateY(0) scale(1.02);}
.slf-promo-content{display:flex;flex-direction:column;justify-content:center;padding:5rem 4.5rem 5rem 3.5rem;}
.slf-new-tag{display:inline-flex;align-items:center;gap:.5rem;background:rgba(158,61,34,.1);border:1px solid rgba(158,61,34,.3);border-radius:100px;padding:.35rem 1rem;font-size:.7rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--rust);margin-bottom:1.8rem;width:fit-content;}
.slf-new-tag::before{content:"★";}
.slf-title{font-family:"Playfair Display",serif;font-size:clamp(2.8rem,4.5vw,4.5rem);font-weight:900;line-height:1;color:#fff;margin-bottom:.8rem;}
.slf-author-line{font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(0,210,235,.75);margin-bottom:2rem;}
.slf-tagline{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:1.3rem;line-height:1.55;color:rgba(255,255,255,.65);margin-bottom:1.5rem;max-width:400px;}
.slf-desc{font-size:.9rem;line-height:1.75;color:rgba(255,255,255,.45);max-width:420px;margin-bottom:2.2rem;}
.slf-publisher{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:2rem;}
.slf-cta-group{display:flex;gap:1rem;flex-wrap:wrap;}
.slf-btn-primary{font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:var(--rust);padding:.9rem 2rem;border-radius:2px;text-decoration:none;}
.slf-btn-ghost{font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.45);text-decoration:none;border-bottom:1px solid rgba(255,255,255,.2);padding-bottom:2px;}
/* SECTION */
.section-tag{font-size:.7rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--rust);margin-bottom:.8rem;}
.section-title{font-family:"Playfair Display",serif;font-weight:700;color:var(--brown);}
/* BOOKS */
.books-section{background:var(--cream);padding:7rem 4.5rem;}
.books-intro{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:4rem;border-bottom:1px solid rgba(61,43,31,.1);padding-bottom:2.5rem;}
.books-title{font-size:clamp(2.5rem,4vw,3.5rem);line-height:1.05;}
.books-sub{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:1.1rem;color:var(--mid);max-width:300px;text-align:right;line-height:1.5;}
.books-list{display:flex;flex-direction:column;}
.book-row{display:grid;grid-template-columns:auto 1fr auto;gap:3.5rem;align-items:start;padding:3.5rem 0;border-bottom:1px solid rgba(61,43,31,.08);transition:background .25s;cursor:pointer;}
.book-row:hover{background:var(--sand);}
.book-cover{width:130px;border-radius:3px;box-shadow:4px 6px 20px rgba(0,0,0,.15);flex-shrink:0;}
.book-row:hover .book-cover{transform:none;box-shadow:4px 6px 20px rgba(0,0,0,.15);}
.book-num{font-family:"Playfair Display",serif;font-size:.75rem;font-weight:700;letter-spacing:.1em;color:var(--fog);margin-bottom:.5rem;}
.book-info-title{font-family:"Playfair Display",serif;font-size:clamp(1.6rem,2.5vw,2.2rem);font-weight:700;line-height:1.1;color:var(--brown);margin-bottom:.6rem;}
.book-info-year{font-size:.72rem;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--rust);margin-bottom:1rem;}
.book-info-desc{font-family:"Cormorant Garamond",serif;font-size:1.1rem;font-style:italic;color:var(--mid);line-height:1.55;max-width:560px;}
.book-synopsis{font-size:.9rem;line-height:1.78;color:var(--mid);max-width:560px;margin-top:1rem;}
.book-awards{margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap;}
.award-pill{font-size:.65rem;font-weight:500;letter-spacing:.06em;background:rgba(158,61,34,.08);color:var(--rust);border:1px solid rgba(158,61,34,.15);border-radius:100px;padding:.3rem .8rem;}
.book-action{display:flex;flex-direction:column;align-items:flex-end;gap:.8rem;flex-shrink:0;padding-top:.4rem;}
.book-buy-btn{font-size:.75rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:var(--rust);padding:.7rem 1.6rem;border-radius:2px;text-decoration:none;transition:background .25s;white-space:nowrap;}
.book-buy-btn:hover{background:var(--brown);}
.book-more-btn{font-size:.72rem;font-weight:500;color:var(--mid);text-decoration:none;border-bottom:1px solid rgba(107,84,68,.25);padding-bottom:1px;white-space:nowrap;}
/* BQC */
.bqc{display:none;}
.bqc-slide{position:absolute;inset:0;padding:1.1rem 1.4rem 0 1.2rem;display:flex;flex-direction:column;justify-content:center;opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s;pointer-events:none;}
.bqc-slide.bqc-active{opacity:1;transform:translateY(0);pointer-events:auto;position:relative;inset:auto;}
.bqc-slide.bqc-exit{opacity:0;transform:translateY(-8px);position:absolute;inset:0;pointer-events:none;}
.bqc-text{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:1rem;color:var(--mid);line-height:1.6;margin-bottom:.45rem;}
.bqc-cite{font-family:"DM Sans",sans-serif;font-style:normal;font-size:.7rem;font-weight:500;letter-spacing:.09em;color:var(--fog);}
.bqc-controls{display:flex;align-items:center;gap:.4rem;margin-top:.9rem;}
.bqc-dot{width:5px;height:5px;border-radius:50%;background:rgba(158,61,34,.18);border:none;cursor:pointer;padding:0;transition:background .25s,transform .25s;}
.bqc-dot.active{background:var(--rust);transform:scale(1.35);}
.bqc-nav{background:none;border:none;cursor:pointer;color:var(--fog);font-size:.9rem;padding:0 .2rem;line-height:1;margin-left:auto;}
.bqc-nav:hover{color:var(--rust);}
.bqc-counter{font-size:.62rem;font-weight:500;color:var(--fog);margin-left:.4rem;}
/* OTHER WRITING */
.ow-section{background:var(--cream);padding:6rem 4.5rem;}
.ow-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-top:2.5rem;}
.ow-card{background:var(--sand);border-radius:4px;padding:2rem;border:1px solid rgba(61,43,31,.08);}
.ow-card-tag{font-size:.65rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--rust);margin-bottom:.6rem;}
.ow-card-title{font-family:"Playfair Display",serif;font-size:1.25rem;color:var(--brown);margin-bottom:.7rem;}
.ow-card-desc{font-size:.9rem;color:var(--mid);line-height:1.7;}
.ow-card-link{display:inline-block;margin-top:1rem;font-size:.72rem;font-weight:500;color:var(--rust);text-decoration:none;border-bottom:1px solid rgba(158,61,34,.3);padding-bottom:1px;}
/* PRAISE */
.praise{background:var(--brown);padding:6rem 4.5rem;position:relative;overflow:hidden;}
.praise::before{content:'"';position:absolute;top:-4rem;left:1.5rem;font-family:"Playfair Display",serif;font-size:22rem;line-height:1;color:rgba(255,255,255,.03);pointer-events:none;}
.praise-inner{max-width:800px;margin:0 auto;text-align:center;}
.praise-tag{color:rgba(245,240,232,.4);margin-bottom:2.5rem;}
.praise-quote{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:clamp(1.4rem,2.3vw,1.9rem);line-height:1.55;color:var(--sand);margin-bottom:1.5rem;transition:opacity .3s;}
.praise-author{font-size:.78rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(245,240,232,.42);transition:opacity .3s;}
.praise-dots{display:flex;justify-content:center;gap:.5rem;margin-top:2.5rem;}
.praise-dot{width:6px;height:6px;border-radius:50%;background:rgba(245,240,232,.2);cursor:pointer;transition:background .25s;border:none;padding:0;}
.praise-dot.active{background:var(--rust);}
/* ABOUT */
.about-hero{background:var(--sand);padding:8rem 4.5rem 6rem;display:grid;grid-template-columns:1.1fr 1fr;gap:6rem;align-items:start;margin-top:72px;}
.about-photos{position:relative;height:620px;}
.about-photo-main{position:absolute;top:0;left:0;width:78%;height:92%;object-fit:cover;object-position:top;border-radius:4px;box-shadow:0 16px 48px rgba(0,0,0,.15);}
.about-photo-second{position:absolute;bottom:0;right:0;width:52%;height:55%;object-fit:cover;object-position:top;border-radius:4px;box-shadow:0 12px 36px rgba(0,0,0,.18);border:4px solid var(--cream);}
.about-photo-credit{position:absolute;bottom:1rem;left:1rem;font-size:.6rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.7);background:rgba(0,0,0,.35);padding:.25rem .6rem;border-radius:2px;}
.about-title{font-size:clamp(2.2rem,3.5vw,3rem);line-height:1.1;margin-bottom:1.5rem;}
.about-text{font-size:1rem;line-height:1.8;color:var(--mid);margin-bottom:1.2rem;}
.about-text.lead{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:1.2rem;color:var(--brown);line-height:1.65;}
.about-stats{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin:2.5rem 0;padding:2rem;background:var(--cream);border-radius:4px;border:1px solid rgba(61,43,31,.08);}
.stat-num{font-family:"Playfair Display",serif;font-size:2rem;font-weight:700;color:var(--rust);line-height:1;margin-bottom:.3rem;}
.stat-label{font-size:.75rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--mid);}
.about-awards-list{display:flex;flex-direction:column;gap:.7rem;}
.about-award{display:flex;align-items:center;gap:.75rem;font-size:.88rem;color:var(--mid);}
.about-award::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--rust);flex-shrink:0;}
.about-gallery-section{background:var(--cream);padding:5rem 4.5rem;}
.photo-gallery{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;margin-top:2.5rem;}
.gallery-item{position:relative;overflow:hidden;border-radius:4px;}
.gallery-item img{width:100%;aspect-ratio:2/3;object-fit:cover;object-position:top;transition:transform .4s;display:block;}
.gallery-item:hover img{transform:scale(1.04);}
.gallery-caption{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.6));padding:.5rem .7rem;font-size:.62rem;color:rgba(255,255,255,.8);letter-spacing:.08em;text-transform:uppercase;}
.about-workshops{background:var(--warm);padding:5rem 4.5rem;}
.about-section-h{font-family:"Playfair Display",serif;font-size:1.8rem;font-weight:700;color:var(--brown);margin-bottom:1.5rem;}
.workshop-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-top:1rem;}
.workshop-card{background:var(--cream);border-radius:4px;padding:1.8rem;border:1px solid rgba(61,43,31,.08);}
.workshop-card h4{font-family:"Playfair Display",serif;font-size:1.1rem;color:var(--brown);margin-bottom:.7rem;}
.workshop-list{list-style:none;display:flex;flex-direction:column;gap:.4rem;}
.workshop-list li{font-size:.88rem;color:var(--mid);display:flex;align-items:flex-start;gap:.5rem;}
.workshop-list li::before{content:"◦";color:var(--rust);flex-shrink:0;}
.author-chips{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.8rem;}
.author-chip{font-size:.72rem;background:var(--sand);border:1px solid rgba(61,43,31,.1);border-radius:100px;padding:.2rem .7rem;color:var(--mid);}
/* NEWS */
.podcast-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.08);}
.podcast-card h4{font-size:.95rem;font-weight:500;color:var(--brown);line-height:1.4;margin-bottom:.4rem;}
.podcast-card p{font-size:.82rem;color:var(--mid);line-height:1.55;margin-bottom:.6rem;}
/* EVENTS */
.events-section{background:var(--warm);padding:5rem 4.5rem;}
.event-upcoming-item:first-of-type{border-top:1px solid rgba(61,43,31,.1);}
.event-link:hover{color:var(--rust);border-color:var(--rust);}
.past-list{list-style:none;padding:0 0 1.5rem;animation:fadeUp .3s ease;}
.past-list li{display:grid;grid-template-columns:80px 1fr;gap:1.4rem;padding:.7rem 0;border-bottom:1px solid rgba(61,43,31,.05);align-items:baseline;}
.past-list li:last-child{border-bottom:none;}
.past-list li strong{font-family:"Playfair Display",serif;font-size:.78rem;font-weight:700;color:var(--rust);letter-spacing:.04em;line-height:1.6;}
.past-list li span.pe-title{font-size:.9rem;color:var(--mid);line-height:1.55;}
(max-width:600px){
  .past-list li{grid-template-columns:62px 1fr;gap:.8rem;}
  .past-list li strong{font-size:.72rem;}
  .past-list li span.pe-title{font-size:.84rem;}
}
/* PRESS KIT */
.pk-hero{background:var(--sand);padding:8rem 4.5rem 5rem;margin-top:72px;}
.pk-title{font-size:clamp(2.5rem,4vw,3.8rem);line-height:1.05;margin-bottom:1rem;}
.pk-intro{font-size:1.05rem;color:var(--mid);max-width:640px;line-height:1.8;margin-bottom:2rem;}
.pk-pronunciation{display:inline-flex;align-items:center;gap:.6rem;background:rgba(158,61,34,.08);border:1px solid rgba(158,61,34,.15);border-radius:100px;padding:.4rem 1rem;font-size:.8rem;color:var(--rust);margin-bottom:2rem;}
.pk-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-top:1rem;}
.pk-card{background:#fff;border-radius:4px;padding:2.2rem;border:1px solid rgba(61,43,31,.07);transition:box-shadow .3s;}
.pk-card:hover{box-shadow:0 10px 36px rgba(0,0,0,.07);}
.pk-icon{font-size:1.8rem;margin-bottom:1rem;}
.pk-card-title{font-family:"Playfair Display",serif;font-size:1.25rem;font-weight:700;color:var(--brown);margin-bottom:.7rem;}
.pk-card-desc{font-size:.9rem;color:var(--mid);line-height:1.7;margin-bottom:1.5rem;}
.pk-btn{display:inline-block;font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--rust);text-decoration:none;border:1px solid rgba(158,61,34,.3);padding:.6rem 1.2rem;border-radius:2px;transition:all .25s;}
.pk-btn:hover{background:var(--rust);color:#fff;}
.pk-bios{background:var(--cream);padding:5rem 4.5rem;}
.pk-bios-title{font-family:"Playfair Display",serif;font-size:1.8rem;font-weight:700;color:var(--brown);margin-bottom:2rem;}
.pk-bio-block{background:var(--sand);border-radius:4px;padding:2rem;margin-bottom:1.5rem;border:1px solid rgba(61,43,31,.08);}
.pk-bio-label{font-size:.65rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--rust);margin-bottom:.7rem;}
.pk-bio-text{font-size:.92rem;color:var(--mid);line-height:1.8;}
.pk-photos-section{background:var(--warm);padding:5rem 4.5rem;}
.pk-photos-title{font-family:"Playfair Display",serif;font-size:1.8rem;font-weight:700;color:var(--brown);margin-bottom:.5rem;}
.pk-photos-sub{font-size:.88rem;color:var(--mid);margin-bottom:2rem;}
.pk-photos-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;}
.pk-photo-item img{width:100%;object-fit:cover;border-radius:3px;transition:transform .3s;}
.pk-photo-item:hover img{transform:scale(1.02);}
.pk-photo-caption{font-size:.62rem;color:var(--fog);margin-top:.4rem;letter-spacing:.06em;}
.pk-contact{background:var(--brown);padding:5rem 4.5rem;}
.pk-contact-title{font-family:"Playfair Display",serif;font-size:2rem;color:var(--sand);margin-bottom:1rem;}
.pk-contact-text{font-size:.95rem;color:rgba(245,240,232,.65);line-height:1.8;max-width:600px;margin-bottom:2rem;}
.pk-contact-links{display:flex;gap:1rem;flex-wrap:wrap;}
.pk-contact-link{font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--sand);text-decoration:none;border:1px solid rgba(245,240,232,.25);padding:.65rem 1.3rem;border-radius:2px;transition:all .25s;}
.pk-contact-link:hover{background:rgba(245,240,232,.1);border-color:rgba(245,240,232,.5);}
/* FOOTER */
footer{background:var(--brown);padding:4.5rem 4.5rem 2.5rem;}
.footer-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:3.5rem;margin-bottom:3.5rem;}
.footer-brand{font-family:"Playfair Display",serif;font-size:1.4rem;color:var(--sand);margin-bottom:.8rem;}
.footer-bio{font-size:.85rem;line-height:1.7;color:rgba(245,240,232,.5);}
.footer-col-label{font-size:.65rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--rust);margin-bottom:1.2rem;}
.footer-links{list-style:none;display:flex;flex-direction:column;gap:.65rem;}
.footer-links a,.footer-links span{font-size:.88rem;color:rgba(245,240,232,.55);text-decoration:none;cursor:pointer;transition:color .25s;}
.footer-links a:hover,.footer-links span:hover{color:var(--sand);}
.footer-bottom{border-top:1px solid rgba(245,240,232,.08);padding-top:2rem;display:flex;justify-content:space-between;align-items:center;}
.footer-copy{font-size:.72rem;color:rgba(245,240,232,.3);}
.footer-social{display:flex;gap:1.8rem;}
.footer-social a{font-size:.72rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(245,240,232,.35);text-decoration:none;}
.footer-social a:hover{color:var(--rust);}
.footer-acknowledge{font-size:.95rem;font-style:italic;color:rgba(245,240,232,.55);margin-top:1.5rem;text-align:center;border-top:1px solid rgba(245,240,232,.12);padding-top:1.5rem;line-height:1.7;}
/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.reveal{opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
/* RESPONSIVE */
@media(max-width:960px){
  nav{padding:1rem 1.5rem;}
  .nav-tabs li a{padding:.35rem .6rem;font-size:.68rem;}
  .hero{grid-template-columns:1fr;min-height:auto;}
  .hero-left{padding:5rem 1.5rem 3rem;}
  .hero-right{height:85vw;min-height:300px;max-height:520px;}
  .slf-promo{grid-template-columns:1fr;}
  .slf-promo-content{padding:3rem 1.5rem;}
  .books-section,.ow-section{padding:5rem 1.5rem;}
  .books-intro{flex-direction:column;align-items:flex-start;gap:1rem;}
  .book-row{grid-template-columns:auto 1fr;gap:1.5rem;}
  .book-action{display:flex;flex-direction:row;flex-wrap:wrap;gap:.5rem;align-items:center;padding-top:.5rem;grid-column:2;}
  .about-hero{grid-template-columns:1fr;padding:5rem 1.5rem;margin-top:72px;}
  .about-photos{height:400px;}
  .about-gallery-section,.about-workshops{padding:4rem 1.5rem;}
  .photo-gallery,.pk-photos-grid{grid-template-columns:repeat(3,1fr);}
  .workshop-grid{grid-template-columns:1fr;}
  .events-section{padding:4rem 1.5rem;}
  .pk-hero,.pk-bios,.pk-photos-section,.pk-contact{padding:4rem 1.5rem;}
  .pk-grid{grid-template-columns:1fr;}
  .newsletter{grid-template-columns:1fr;padding:5rem 1.5rem;gap:2.5rem;}
  .nl-row{grid-template-columns:1fr;}
  footer{padding:3rem 1.5rem 2rem;}
  .footer-top{grid-template-columns:1fr 1fr;gap:2rem;}
  .footer-bottom{flex-direction:column;gap:1rem;}
  .ow-grid{grid-template-columns:1fr;}
}
/* KATE SERIES */
.kate-series{background:var(--sand);padding:6rem 4.5rem;}
.kate-series-inner{max-width:1200px;margin:0 auto;}
.kate-series-title{font-size:clamp(2rem,3.5vw,3rem);margin-bottom:.6rem;}
.kate-series-sub{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:1.15rem;color:var(--mid);margin-bottom:3rem;line-height:1.5;}
.kate-books-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;margin-bottom:3rem;}
.kate-book-card{background:var(--cream);border-radius:4px;overflow:hidden;border:1px solid rgba(61,43,31,.08);transition:transform .3s,box-shadow .3s;cursor:pointer;}

.kate-book-num{font-family:"Playfair Display",serif;font-size:.7rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--rust);padding:.8rem 1.4rem .3rem;background:var(--warm);}
.kate-book-cover{width:100%;object-fit:cover;object-position:top;display:block;}
.kate-book-body{padding:1.4rem;}
.kate-book-title{font-family:"Playfair Display",serif;font-size:1.35rem;font-weight:700;color:var(--brown);margin-bottom:.4rem;}
.kate-book-tag{font-size:.72rem;font-weight:500;letter-spacing:.06em;color:var(--rust);margin-bottom:.6rem;}
.kate-book-desc{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:.95rem;color:var(--mid);line-height:1.6;margin-bottom:1rem;}
.kate-book-btn{display:inline-block;font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--rust);text-decoration:none;border-bottom:1px solid rgba(158,61,34,.3);padding-bottom:1px;cursor:pointer;}
.kate-series-footer{text-align:center;padding-top:1rem;}
@media(max-width:960px){
  .kate-series{padding:4rem 1.5rem;}
  .kate-books-grid{grid-template-columns:1fr;}
  .kate-book-card{overflow:visible;}
  .kate-book-cover{width:100%;height:110vw;object-fit:cover;object-position:top;display:block;}
  .kate-book-card img{height:110vw;}
}
/* STAY IN THE LOOP */
.loop-strip{background:var(--rust);padding:5rem 4.5rem;text-align:center;position:relative;overflow:hidden;}
.loop-strip::before{content:"";position:absolute;right:-6rem;top:-6rem;width:28rem;height:28rem;border-radius:50%;background:rgba(255,255,255,.05);pointer-events:none;}
.loop-strip::after{content:"";position:absolute;left:-4rem;bottom:-4rem;width:20rem;height:20rem;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none;}
.loop-inner{position:relative;z-index:1;max-width:640px;margin:0 auto;}
.loop-tag{font-size:.7rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:.9rem;}
.loop-title{font-family:"Playfair Display",serif;font-size:clamp(2rem,3.5vw,3rem);font-weight:700;line-height:1.1;color:#fff;margin-bottom:1.2rem;}
.loop-desc{font-size:1rem;line-height:1.75;color:rgba(255,255,255,.8);margin-bottom:2.2rem;}
.loop-btn{display:inline-block;font-size:.8rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--rust);background:#fff;padding:.9rem 2.2rem;border-radius:2px;text-decoration:none;cursor:pointer;transition:background .25s,color .25s;}
.loop-btn:hover{background:var(--brown);color:#fff;}
@media(max-width:960px){.loop-strip{padding:4rem 1.5rem;}}
/* REVIEW CAROUSEL */
.review-carousel-wrap{background:var(--rust);padding:3rem 4.5rem;border-bottom:3px solid rgba(61,43,31,.12);}
.rc-heading{font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.12em;text-transform:uppercase;margin-bottom:2rem;}
.review-carousel{position:relative;overflow:hidden;}
.rc-track{position:relative;min-height:100px;}
.rc-slide{position:absolute;inset:0;opacity:0;transform:translateX(40px);transition:opacity .5s ease,transform .5s ease;pointer-events:none;display:flex;flex-direction:column;justify-content:center;}
.rc-slide.rc-active{opacity:1;transform:translateX(0);pointer-events:auto;position:relative;inset:auto;}
.rc-slide.rc-exit-left{opacity:0;transform:translateX(-40px);}
.rc-slide.rc-exit-right{opacity:0;transform:translateX(40px);}
.rc-quote{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:clamp(1.1rem,1.8vw,1.4rem);line-height:1.6;color:#fff;margin-bottom:.8rem;max-width:820px;}
.rc-source{font-family:"DM Sans",sans-serif;font-size:.75rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.6);}
.rc-source a{color:rgba(255,255,255,.8);text-decoration:none;border-bottom:1px solid rgba(255,255,255,.3);}
.rc-source a:hover{color:#fff;}
.rc-controls{display:flex;align-items:center;gap:1rem;margin-top:1.8rem;}
.rc-arrow{background:none;border:1px solid rgba(255,255,255,.35);color:#fff;font-size:1.4rem;line-height:1;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s;flex-shrink:0;}
.rc-arrow:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.7);}
.rc-dots{display:flex;gap:.5rem;align-items:center;}
.rc-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);border:none;cursor:pointer;padding:0;transition:background .25s,transform .25s;}
.rc-dot.active{background:#fff;transform:scale(1.4);}
.rc-counter{font-size:.7rem;font-weight:500;letter-spacing:.1em;color:rgba(255,255,255,.45);margin-top:.8rem;}
@media(max-width:960px){
  .review-carousel-wrap{padding:2.5rem 1.5rem;}
  .rc-track{min-height:auto;padding-bottom:1rem;}
}
/* OTHER WRITING */
.other-writing{background:var(--cream);padding:5rem 4.5rem;border-top:1px solid rgba(61,43,31,.08);}
.other-writing-title{font-size:clamp(2rem,3vw,2.8rem);margin-bottom:.5rem;}
.other-writing-intro{font-size:.88rem;color:var(--fog);letter-spacing:.06em;margin-bottom:3.5rem;font-style:italic;}
.ow-cards{display:grid;grid-template-columns:1fr 1fr;gap:2rem;}
.ow-card{background:var(--sand);border-radius:4px;padding:2.2rem 2.4rem;border:1px solid rgba(61,43,31,.08);display:flex;flex-direction:column;}
.ow-card-label{font-size:.65rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--rust);margin-bottom:.7rem;}
.ow-card-title{font-family:"Playfair Display",serif;font-size:1.35rem;font-weight:700;color:var(--brown);margin-bottom:1rem;line-height:1.2;}
.ow-card-body{font-size:.92rem;color:var(--mid);line-height:1.8;flex:1;}
.ow-card-body em{font-style:italic;}
.ow-card-links{margin-top:1.5rem;display:flex;flex-direction:column;gap:.5rem;}
.ow-card-links a{font-size:.78rem;font-weight:500;color:var(--rust);text-decoration:none;border-bottom:1px solid rgba(158,61,34,.25);padding-bottom:1px;width:fit-content;transition:border-color .2s;}
.ow-card-links a:hover{border-color:var(--rust);}
.ow-card-cta{display:inline-block;margin-top:1.5rem;font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:var(--rust);padding:.65rem 1.4rem;border-radius:2px;text-decoration:none;width:fit-content;transition:background .25s;}
.ow-card-cta:hover{background:var(--brown);}
@media(max-width:960px){
  .other-writing{padding:4rem 1.5rem;}
  .ow-cards{grid-template-columns:1fr;}
}
/* ABOUT PAGE */
.about-page{background:var(--cream);padding:6rem 4.5rem;margin-top:72px;}
.about-page-inner{max-width:860px;margin:0 auto;}
.about-page-title{font-family:"Playfair Display",serif;font-size:clamp(2.2rem,4vw,3.2rem);font-weight:700;color:var(--brown);margin-bottom:1.8rem;}
.about-page-intro{font-size:.98rem;color:var(--mid);line-height:1.8;margin-bottom:.7rem;}
.about-page-intro a{color:var(--rust);text-decoration:none;border-bottom:1px solid rgba(158,61,34,.3);}
.about-pronunciation{margin-top:.4rem;}
.about-divider{border:none;border-top:1px solid rgba(61,43,31,.12);margin:2.5rem 0;}
.about-section-heading{font-family:"Playfair Display",serif;font-size:1.5rem;font-weight:700;color:var(--brown);margin-bottom:1.2rem;}
.about-bio-text{font-size:.98rem;color:var(--mid);line-height:1.85;margin-bottom:1rem;}
.about-bio-text a{color:var(--rust);text-decoration:none;border-bottom:1px solid rgba(158,61,34,.25);}
.about-bio-text a:hover{border-color:var(--rust);}
.about-photos-note{font-size:.85rem;color:var(--fog);margin-bottom:1.8rem;}
.about-photos-note a{color:var(--rust);text-decoration:none;}
.about-photos-grid{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto;gap:1rem;}
.about-photo-item{overflow:hidden;border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,.1);}
.about-photo-item img{width:100%;height:100%;display:block;object-fit:cover;object-position:top;transition:transform .4s ease;}
.about-photo-item.portrait{grid-row:1;}
.about-photo-item.portrait img{aspect-ratio:2/3;}
.about-photo-item.landscape{grid-row:2;}
.about-photo-item.landscape:first-of-type{grid-column:1/span 1;}
.about-photo-item.landscape:last-of-type{grid-column:2/span 2;}
.about-photo-item.landscape img{aspect-ratio:16/9;width:100%;height:100%;}
.about-photo-item:hover img{transform:scale(1.03);}
@media(max-width:960px){
  .about-page{padding:4rem 1.5rem;}
  .about-hero-photo{max-width:280px;}
  .about-photos-grid{grid-template-columns:1fr 1fr;grid-template-rows:unset;}
  .about-photo-item.portrait,.about-photo-item.landscape{grid-row:unset;grid-column:unset;}
  .about-photo-item.portrait img{aspect-ratio:2/3;}
  .about-photo-item.landscape img{aspect-ratio:3/2;}
}
/* ABOUT TOP ROW */
.about-top-row{display:grid;grid-template-columns:280px 1fr;gap:3rem;align-items:start;margin-bottom:0;}
.about-top-photo{overflow:hidden;border-radius:4px;box-shadow:0 8px 28px rgba(0,0,0,.13);flex-shrink:0;}
.about-top-photo img{width:100%;display:block;object-fit:cover;object-position:top;}
.about-top-text{display:flex;flex-direction:column;justify-content:flex-start;padding-top:.2rem;}
/* PK CARDS GRID */
.pk-cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-top:1.5rem;}
.pk-card-item{background:#fff;border-radius:4px;padding:2rem 2.2rem;border:1px solid rgba(61,43,31,.09);display:flex;flex-direction:column;}
.pk-card-icon{font-size:1.6rem;margin-bottom:1rem;line-height:1;}
.pk-card-item-title{font-family:"Playfair Display",serif;font-size:1.1rem;font-weight:700;color:var(--brown);margin-bottom:.8rem;}
.pk-card-item-desc{font-size:.88rem;color:var(--mid);line-height:1.7;flex:1;margin-bottom:1.4rem;}
.pk-card-item-btn{display:inline-block;font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--rust);text-decoration:none;border:1px solid rgba(158,61,34,.35);padding:.55rem 1.1rem;border-radius:2px;width:fit-content;transition:background .2s,color .2s;cursor:pointer;}
.pk-card-item-btn:hover{background:var(--rust);color:#fff;}
@media(max-width:960px){
  .about-top-row{grid-template-columns:1fr;gap:1.5rem;}
  .about-top-photo{max-width:220px;}
  .pk-cards-grid{grid-template-columns:1fr;}
}
/* CONTACT */
.cz-layout{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 72px);position:relative;background:var(--cream);margin-top:72px;}
.cz-vline{position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(61,43,31,.1);z-index:1;pointer-events:none;}
.cz-left{padding:5.5rem 5rem 4rem 5.5rem;display:flex;flex-direction:column;justify-content:space-between;}
.cz-header{margin-bottom:3.5rem;}
.cz-tag{display:inline-block;font-size:.65rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--rust);margin-bottom:1.2rem;}
.cz-heading{font-family:"Playfair Display",serif;font-size:clamp(3.5rem,6vw,6rem);font-weight:900;line-height:.9;color:var(--brown);margin-bottom:1.4rem;}
.cz-lede{font-size:.95rem;color:var(--fog);line-height:1.7;max-width:340px;}
.cz-list{list-style:none;flex:1;}
.cz-item{display:grid;grid-template-columns:72px 1fr;gap:1rem;padding:1.6rem 0;border-bottom:1px solid rgba(61,43,31,.09);opacity:0;animation:fadeUp .5s ease forwards;}
.cz-item:first-child{border-top:1px solid rgba(61,43,31,.09);}
.cz-item-meta{display:flex;flex-direction:column;gap:.3rem;padding-top:.15rem;}
.cz-item-index{font-family:"Playfair Display",serif;font-size:.72rem;font-weight:700;color:var(--rust);opacity:.55;}
.cz-item-category{font-size:.6rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--fog);}
.cz-item-title{font-family:"Playfair Display",serif;font-size:1.05rem;font-weight:700;color:var(--brown);margin-bottom:.25rem;}
.cz-item-who{font-size:.84rem;color:var(--mid);margin-bottom:.45rem;line-height:1.5;}
.cz-item-email{font-size:.82rem;font-weight:500;color:var(--rust);text-decoration:none;border-bottom:1px solid rgba(158,61,34,.2);padding-bottom:1px;word-break:break-all;transition:border-color .2s,color .2s;}
.cz-item-email:hover{border-color:var(--rust);color:var(--brown);}
.cz-social{display:flex;align-items:center;gap:.8rem;padding-top:2.5rem;}
.cz-social-label{font-size:.65rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--fog);}
.cz-social-icon-link{display:inline-flex;align-items:center;}
.cz-social-icon-link svg{opacity:.85;transition:transform .2s,opacity .2s;width:24px;height:24px;}
.cz-social-icon-link:hover svg{transform:scale(1.12);opacity:1;}

.cz-photo-wrap{position:absolute;inset:0;}
.cz-photo{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;transition:transform .8s ease;}
.cz-right:hover .cz-photo{transform:scale(1.03);}
.cz-photo-shade{position:absolute;inset:0;background:linear-gradient(160deg,transparent 50%,rgba(30,18,10,.55) 100%);}
.cz-photo-badge{position:absolute;bottom:2rem;right:2rem;text-align:right;display:flex;flex-direction:column;gap:.2rem;}
.cz-photo-badge span{font-size:.6rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.45);}
@media(max-width:960px){
  .cz-layout{grid-template-columns:1fr;min-height:auto;}
  .cz-vline{display:none;}
  .cz-right{min-height:80vw;max-height:400px;}
  .cz-left{padding:3.5rem 1.5rem 3rem;}
}
/* PAST EVENTS ACCORDION */
.past-accordion{margin-top:1rem;}
.past-year-block{border-bottom:1px solid rgba(61,43,31,.1);overflow:hidden;}
.past-year-block:first-child{border-top:1px solid rgba(61,43,31,.1);}
.past-year-toggle{display:flex;justify-content:space-between;align-items:center;padding:1rem 0;cursor:pointer;list-style:none;font-family:"Playfair Display",serif;font-size:1.1rem;font-weight:700;color:var(--brown);user-select:none;transition:color .2s;}
.past-year-toggle::-webkit-details-marker{display:none;}
.past-year-toggle:hover{color:var(--rust);}
.past-toggle-icon{width:20px;height:20px;position:relative;flex-shrink:0;}
.past-toggle-icon::before,.past-toggle-icon::after{content:"";position:absolute;background:var(--rust);border-radius:2px;transition:transform .3s,opacity .3s;}
.past-toggle-icon::before{width:14px;height:2px;top:50%;left:50%;transform:translate(-50%,-50%);}
.past-toggle-icon::after{width:2px;height:14px;top:50%;left:50%;transform:translate(-50%,-50%);}
details[open] .past-toggle-icon::after{transform:translate(-50%,-50%) rotate(90deg);opacity:0;}
/* SOCIAL ICONS */
.social-icon-link{display:inline-flex;align-items:center;vertical-align:middle;border-bottom:none !important;}
.social-icon-link svg{transition:transform .2s;opacity:.8;width:24px;height:24px;}
.social-icon-link:hover svg{transform:scale(1.1);opacity:1;}
.footer-social-icon svg{opacity:.6;transition:opacity .2s,transform .2s;}
.footer-social-icon:hover svg{opacity:1;transform:scale(1.1);}

.book-covers-wrap{display:flex;flex-direction:column;gap:.6rem;flex-shrink:0;}

.book-buy-btn--uk:hover{background:#1e160e !important;}

.ne-layout{background:var(--cream);}
.ne-hero{background:var(--brown);display:grid;grid-template-columns:1fr 260px;align-items:end;gap:0;overflow:hidden;min-height:280px;position:relative;margin-top:72px;}
.ne-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(158,61,34,.18) 0%,transparent 70%);pointer-events:none;}

.ne-hero-title{font-family:"Playfair Display",serif;font-size:clamp(3rem,6vw,5.5rem);font-weight:900;line-height:.9;color:var(--sand);margin-bottom:1.2rem;}

.ne-hero-photo{width:100%;height:100%;object-fit:cover;object-position:top;display:block;opacity:.7;min-height:280px;}
.ne-subnav{background:var(--brown);border-top:1px solid rgba(245,240,232,.08);padding:0 3.5rem;display:flex;gap:0;position:sticky;top:72px;z-index:100;}
.ne-subnav-btn{font-size:.72rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:rgba(245,240,232,.4);background:none;border:none;padding:1.1rem 1.4rem;cursor:pointer;position:relative;transition:color .2s;white-space:nowrap;}
.ne-subnav-btn::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--rust);transform:scaleX(0);transition:transform .25s;}
.ne-subnav-btn:hover{color:rgba(245,240,232,.75);}
.ne-subnav-btn.active{color:#fff;}
.ne-subnav-btn.active::after{transform:scaleX(1);}
.ne-section{padding:3.5rem 3.5rem 4rem;}
.ne-section--hidden{display:none;}
.ne-section-head{display:flex;align-items:baseline;gap:1.2rem;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid rgba(61,43,31,.1);}
.ne-section-title{font-family:"Playfair Display",serif;font-size:1.6rem;font-weight:700;color:var(--brown);}
.ne-section-count{font-size:.68rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--fog);}
.ne-upcoming{display:flex;flex-direction:column;gap:0;}
.ne-podcast-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;}
.ne-podcast-grid .podcast-card{background:#fff;border-radius:4px;border:1px solid rgba(61,43,31,.07);display:flex;gap:0;overflow:hidden;transition:box-shadow .25s,transform .25s;}
.ne-podcast-grid .podcast-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.1);transform:translateY(-3px);}
.ne-podcast-grid .podcast-card-img{width:80px;height:80px;object-fit:cover;flex-shrink:0;}
.ne-podcast-grid .podcast-card > div{padding:.9rem 1rem;display:flex;flex-direction:column;justify-content:space-between;}
.ne-podcast-grid h4{font-family:"Playfair Display",serif;font-size:.88rem;font-weight:700;color:var(--brown);line-height:1.3;margin-bottom:.3rem;}
.ne-podcast-grid p{font-size:.78rem;color:var(--mid);line-height:1.5;margin-bottom:.5rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ne-podcast-grid .podcast-link{font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--rust);text-decoration:none;}
.ne-archive-list{display:flex;flex-direction:column;}
.ne-archive-list .na-item{display:flex;align-items:baseline;gap:1.2rem;padding:1.1rem 0;border-bottom:1px solid rgba(61,43,31,.07);}
.ne-archive-list .na-item:first-child{border-top:1px solid rgba(61,43,31,.07);}
.ne-archive-list .na-body{flex:1;}
.ne-archive-list .na-title{font-family:"Playfair Display",serif;font-size:.95rem;font-weight:700;color:var(--brown);line-height:1.35;margin-bottom:.2rem;}
.ne-archive-list .na-text{font-size:.82rem;color:var(--mid);}
.ne-archive-list .na-text a{color:var(--rust);text-decoration:none;border-bottom:1px solid rgba(158,61,34,.2);}
.ne-archive-list .na-text a:hover{border-color:var(--rust);}
.ne-archive-list .na-img{display:none;}
@media(max-width:960px){
  .ne-hero{grid-template-columns:1fr;margin-top:72px;min-height:300px;}
  .ne-hero-photo{display:block;width:100%;height:85vw;min-height:300px;max-height:520px;object-fit:cover;object-position:top center;}
  .ne-hero-text{padding:3rem 1.5rem 2.5rem;}
  .ne-subnav{padding:0 1rem;top:72px;overflow-x:auto;}
  .ne-section{padding:2.5rem 1.5rem 3rem;}
  .ne-podcast-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:600px){
  .ne-podcast-grid{grid-template-columns:1fr;}
}
@media(max-width:480px){
  .nav-tabs li a{padding:.35rem .5rem;font-size:.62rem;letter-spacing:.03em;}
  .nav-logo{font-size:.95rem;}
  .book-covers-wrap .book-cover{width:80px;}
  .book-row{gap:1rem;}
  .cz-heading{font-size:2.8rem;}
  .ne-hero-title{font-size:2.8rem;}
  .ne-subnav-btn{font-size:.65rem;padding:.9rem .9rem;letter-spacing:.1em;}
}
@media(max-width:960px){
  .book-buy-btn{font-size:.65rem;padding:.5rem 1rem;}
  .book-more-btn{font-size:.65rem;}
}
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute;overflow:hidden;">
  <defs>
    <radialGradient id="ig-grad" cx="30%" cy="107%" r="120%">
      <stop offset="0%"  stop-color="#fdf497"/>
      <stop offset="5%"  stop-color="#fdf497"/>
      <stop offset="45%" stop-color="#fd5949"/>
      <stop offset="60%" stop-color="#d6249f"/>
      <stop offset="90%" stop-color="#285AEB"/>
    </radialGradient>
  </defs>
</svg>

<nav id="main-nav">
  <a class="nav-logo" href="{{ '/' | relative_url }}">Dinuka <span>McKenzie</span></a>
  <ul class="nav-tabs">
    <li><a href="{{ '/' | relative_url }}" id="tab-home">Home</a></li>
    <li><a href="{{ '/books/' | relative_url }}" id="tab-books">Books</a></li>
    <li><a href="{{ '/about/' | relative_url }}" id="tab-about">About</a></li>
    <li><a href="{{ '/news/' | relative_url }}" id="tab-news">News &amp; Events</a></li>
    <li><a href="{{ '/contact/' | relative_url }}" id="tab-contact">Contact</a></li>
  </ul>
</nav>

{{ content }}

<script>
// ── HIGHLIGHT ACTIVE NAV TAB ──
(function() {
  var path = window.location.pathname.replace(/\/+$/, '');
  var map = { '': 'tab-home', '/books': 'tab-books', '/about': 'tab-about', '/news': 'tab-news', '/contact': 'tab-contact' };
  // Also handle baseurl
  var base = '{{ site.baseurl }}'.replace(/\/+$/, '');
  if (base) { path = path.replace(base, ''); }
  var tabId = map[path] || 'tab-home';
  var tab = document.getElementById(tabId);
  if (tab) tab.classList.add('active');
})();

// ── INJECT FOOTERS ──
var FH = '<div class="footer-top">' +
  '<div><div class="footer-brand">Dinuka McKenzie</div><p class="footer-bio">Award-winning Australian crime fiction author. Represented by Alex Adsett Literary.</p></div>' +
  '<div><p class="footer-col-label">Books</p><ul class="footer-links">' +
    '<li><a href="' + '{{ "/books/" | relative_url }}' + '">She Lied First</a></li>' +
    '<li><a href="' + '{{ "/books/" | relative_url }}' + '">The Torrent</a></li>' +
    '<li><a href="' + '{{ "/books/" | relative_url }}' + '">Taken</a></li>' +
    '<li><a href="' + '{{ "/books/" | relative_url }}' + '">Tipping Point</a></li>' +
  '</ul></div>' +
  '<div><p class="footer-col-label">Navigate</p><ul class="footer-links">' +
    '<li><a href="' + '{{ "/" | relative_url }}' + '">Home</a></li>' +
    '<li><a href="' + '{{ "/books/" | relative_url }}' + '">Books</a></li>' +
    '<li><a href="' + '{{ "/about/" | relative_url }}' + '">About</a></li>' +
    '<li><a href="' + '{{ "/news/" | relative_url }}' + '">News &amp; Events</a></li>' +
    '<li><a href="' + '{{ "/contact/" | relative_url }}' + '">Contact</a></li>' +
  '</ul></div>' +
  '<div><p class="footer-col-label">Links</p><ul class="footer-links">' +
    '<li><a href="https://www.harpercollins.com.au" target="_blank">HarperCollins AU</a></li>' +
    '<li><a href="https://www.canelocrime.com" target="_blank">Canelo Crime UK</a></li>' +
    '<li><a href="https://alexadsett.com.au" target="_blank">Alex Adsett Literary</a></li>' +
  '</ul></div>' +
'</div>' +
'<div class="footer-bottom">' +
  '<p class="footer-copy">&#169; 2026 Dinuka McKenzie. All rights reserved.</p>' +
  '<div class="footer-social">' +
    '<a href="https://www.instagram.com/dinukamckenzie/" target="_blank" class="social-icon-link" aria-label="Instagram"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><rect width="24" height="24" rx="5.5" fill="url(#ig-grad)"/><rect x="6.5" y="6.5" width="11" height="11" rx="3" fill="none" stroke="#fff" stroke-width="1.5"/><circle cx="12" cy="12" r="3" fill="none" stroke="#fff" stroke-width="1.5"/><circle cx="17" cy="7" r="1" fill="#fff"/></svg></a>' +
    '<a href="https://www.facebook.com/dinukamckenziewriter/" target="_blank" class="social-icon-link" aria-label="Facebook"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><rect width="24" height="24" rx="5.5" fill="#1877F2"/><path d="M16 8.5h-2c-.55 0-1 .45-1 1V12h3l-.5 3H13v8h-3v-8H8v-3h2V9.5C10 7.01 11.79 5 14 5h2v3.5z" fill="#fff"/></svg></a>' +
  '</div>' +
'</div>' +
'<p class="footer-acknowledge">I acknowledge the Traditional Custodians of the land on which I work and live, the Dharawal Nation, and recognise their continuing connection to land, water and community. I pay my respect to Elders past, present and emerging.</p>';

['home','books','about','news','contact'].forEach(function(id) {
  var el = document.getElementById('footer-' + id);
  if (el) el.innerHTML = FH;
});

// ── NAV SCROLL SHADOW ──
window.addEventListener('scroll', function() {
  document.getElementById('main-nav').classList.toggle('scrolled', window.scrollY > 40);
});

// ── SCROLL REVEAL ──
function triggerReveal() {
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.06, rootMargin: '0px 0px -30px 0px' });
  document.querySelectorAll('.reveal').forEach(function(r) {
    if (!r.classList.contains('visible')) obs.observe(r);
  });
}
triggerReveal();

// ── PRAISE CAROUSEL ──
var quotes = [
  { text: '\u201cThe Torrent is subtle and clever and Dinuka has talent to burn. It unfolds so beautifully and the writer is in control every step of the way. Highly, highly recommended!\u201d', by: '\u2014 Dervla McTiernan, Author' },
  { text: '\u201cSuch a good read.\u201d', by: '\u2014 Val McDermid, Author' },
  { text: '\u201cA dark domestic rural mystery written by a born storyteller. More please.\u201d', by: '\u2014 Michael Robotham, Author' },
  { text: '\u201cHow lucky are we to have Dinuka McKenzie? Taken is a masterclass in crimes that are too close to home.\u201d', by: '\u2014 Hayley Scrivenor, Author' },
  { text: '\u201cThere are few other Australian crime writers in the same league as McKenzie. She is as close to a sure-thing as you can get.\u201d', by: '\u2014 Simon McDonald, Bookseller' },
  { text: '\u201cTipping Point is a truly masterful piece of Australian crime fiction. Pure perfection!\u201d', by: '\u2014 Josh Hortinela, Author & Bookseller' },
  { text: '\u201cVivid, pacy and refreshingly original. A gripping whodunnit with heart.\u201d', by: '\u2014 Emma Viskic, Author' }
];
var cur = 0;
var pt = document.getElementById('praise-text');
var pa = document.getElementById('praise-attrib');
var dc = document.getElementById('praise-dots');
if (pt) { pt.style.transition = pa.style.transition = 'opacity .3s'; }
if (dc) {
  quotes.forEach(function(_, i) {
    var d = document.createElement('button');
    d.className = 'praise-dot' + (i===0?' active':'');
    d.addEventListener('click', function() { goPraise(i); });
    dc.appendChild(d);
  });
}
function goPraise(idx) {
  cur = idx;
  if (!pt) return;
  pt.style.opacity = pa.style.opacity = '0';
  setTimeout(function() {
    pt.textContent = quotes[idx].text;
    pa.textContent = quotes[idx].by;
    pt.style.opacity = pa.style.opacity = '1';
  }, 300);
  document.querySelectorAll('.praise-dot').forEach(function(d,i) { d.classList.toggle('active', i===idx); });
}
setInterval(function() { goPraise((cur+1) % quotes.length); }, 5000);

// ── BOOK QUOTE CAROUSELS ──
document.querySelectorAll('.bqc').forEach(function(carousel) {
  var slides = Array.from(carousel.querySelectorAll('.bqc-slide'));
  var dots   = Array.from(carousel.querySelectorAll('.bqc-dot'));
  var counter = carousel.querySelector('.bqc-counter');
  var total  = slides.length, current = 0, timer = null;
  var row    = carousel.closest('.book-row');
  function goTo(idx) {
    slides[current].classList.remove('bqc-active');
    slides[current].classList.add('bqc-exit');
    setTimeout(function() { slides[current].classList.remove('bqc-exit'); }, 600);
    current = (idx + total) % total;
    slides[current].classList.add('bqc-active');
    dots.forEach(function(d,i) { d.classList.toggle('active', i===current); });
    if (counter) counter.textContent = (current+1) + ' / ' + total;
  }
  function start() { if (!timer) timer = setInterval(function() { goTo(current+1); }, 3800); }
  function stop()  { clearInterval(timer); timer = null; }
  dots.forEach(function(d,i) { d.addEventListener('click', function() { goTo(i); }); });
  var prev = carousel.querySelector('.bqc-prev');
  var next = carousel.querySelector('.bqc-next');
  if (prev) prev.addEventListener('click', function() { goTo(current-1); });
  if (next) next.addEventListener('click', function() { goTo(current+1); });
  if (row) { row.addEventListener('mouseenter', start); row.addEventListener('mouseleave', stop); }
});

// ── REVIEW CAROUSELS ──
document.querySelectorAll('.review-carousel').forEach(function(car) {
  var slides  = Array.from(car.querySelectorAll('.rc-slide'));
  var dots    = Array.from(car.querySelectorAll('.rc-dot'));
  var counter = car.querySelector('.rc-counter');
  var total   = slides.length;
  var cur     = 0;
  var timer   = null;
  slides.forEach(function(s, i) { s.classList.toggle('rc-active', i === 0); });
  function goTo(idx, dir) {
    var prev = slides[cur];
    prev.classList.remove('rc-active');
    prev.classList.add(dir === 'next' ? 'rc-exit-left' : 'rc-exit-right');
    setTimeout(function() { prev.classList.remove('rc-exit-left', 'rc-exit-right'); }, 550);
    cur = (idx + total) % total;
    var next = slides[cur];
    next.style.transform = dir === 'next' ? 'translateX(40px)' : 'translateX(-40px)';
    next.classList.add('rc-active');
    setTimeout(function() { next.style.transform = ''; }, 20);
    dots.forEach(function(d, i) { d.classList.toggle('active', i === cur); });
    if (counter) counter.textContent = (cur + 1) + ' / ' + total;
  }
  function startTimer() { if (!timer) timer = setInterval(function() { goTo(cur + 1, 'next'); }, 2000); }
  function stopTimer() { clearInterval(timer); timer = null; }
  var prevBtn = car.querySelector('.rc-prev');
  var nextBtn = car.querySelector('.rc-next');
  if (prevBtn) prevBtn.addEventListener('click', function() { stopTimer(); goTo(cur - 1, 'prev'); startTimer(); });
  if (nextBtn) nextBtn.addEventListener('click', function() { stopTimer(); goTo(cur + 1, 'next'); startTimer(); });
  dots.forEach(function(d, i) { d.addEventListener('click', function() { stopTimer(); goTo(i, i > cur ? 'next' : 'prev'); startTimer(); }); });
  car.addEventListener('mouseenter', stopTimer);
  car.addEventListener('mouseleave', startTimer);
  startTimer();
});

// ── NEWS & EVENTS SUB-NAV ──
document.querySelectorAll('.ne-subnav-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var target = btn.getAttribute('data-target');
    document.querySelectorAll('.ne-subnav-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    document.querySelectorAll('.ne-section').forEach(function(s) { s.classList.add('ne-section--hidden'); });
    var sec = document.getElementById(target);
    if (sec) {
      sec.classList.remove('ne-section--hidden');
      sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
});

// ── HANDLE data-page LINKS (for internal links in content) ──
var pageMap = { 'home': '/', 'books': '/books/', 'about': '/about/', 'news': '/news/', 'contact': '/contact/' };
document.querySelectorAll('[data-page]').forEach(function(el) {
  if (el.tagName === 'A' && el.getAttribute('href')) return; // skip nav links that already have href
  el.addEventListener('click', function(e) {
    e.preventDefault();
    var target = el.getAttribute('data-page');
    var base = '{{ site.baseurl }}'.replace(/\/+$/, '');
    var url = base + (pageMap[target] || '/');
    window.location.href = url;
  });
});
</script>
</body>
</html>
